[colors]
background = #191724
background-alt = #21202e
foreground = #e0def4
primary = #c4a7e7
secondary = #31748f
tertiary = #f6c177
alert = #eb6f92
disabled = #6e6a86

[bar/main]
width = 100%
height = 40
radius = 0
offset-x = 0
offset-y = 0
dpi=144
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3
line-color = ${colors.primary}
border-size = 0
border-color = ${colors.background}
padding-left = 1
padding-right = 1
module-margin-left = 1
module-margin-right = 1
font-0 = "BerkeleyMono Nerd Font:style=Medium:size=12;2"
font-1 = "BerkeleyMono Nerd Font:style=Bold:size=12;2"
font-2 = "BerkeleyMono Nerd Font:size=12;3"
font-3 = "Material Icons:size=12;3"
modules-left = i3 xwindow
modules-center = date
modules-right = prev playpause next spotify pulseaudio memory cpu
tray-position = right
tray-padding = 8
tray-scale = 1.0
tray-maxsize = 28
tray-background = ${colors.background}
cursor-click = pointer
cursor-scroll = ns-resize
override-redirect = true
wm-restack = i3

[module/xwindow]
type = internal/xwindow
format-foreground = ${colors.foreground}
label =   %title:0:60:...%
label-empty = No Window
label-empty-foreground = ${colors.disabled}

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
pin-workspaces = true
label-mode-padding = 1
label-mode-foreground = ${colors.foreground}
label-mode-background = ${colors.primary}
label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.secondary}
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-padding = 1
label-unfocused-foreground = ${colors.disabled}
label-visible = %index%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${colors.secondary}
label-visible-padding = ${self.label-focused-padding}
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 5
date = "%a, %b %d"
date-alt = "%Y-%m-%d"
time = %H:%M
time-alt = %H:%M:%S
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %date% %time%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}
label-muted = 󰝟 muted
label-muted-foreground = ${colors.disabled}
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.primary}
click-right = pavucontrol

[module/spotify]
type = custom/script
interval = 1
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format = <label>
exec = ~/.local/bin/spotify-status.sh
format-underline = ${colors.primary}
click-left = playerctl play-pause
click-right = playerctl next
click-middle = playerctl previous

[module/prev]
type = custom/ipc
hook-0 = echo "󰒮"
initial = 1
format = <output>
format-foreground = ${colors.secondary}
click-left = playerctl previous

[module/next]
type = custom/ipc
hook-0 = echo "󰒭"
initial = 1
format = <output>
format-foreground = ${colors.secondary}
click-left = playerctl next

[module/playpause]
type = custom/script
exec = playerctl status 2>/dev/null | grep -q "Playing" && echo "󰏤" || echo "󰐊"
interval = 0.5
format-foreground = ${colors.tertiary}
click-left = playerctl play-pause

[settings]
screenchange-reload = true
pseudo-transparency = true
