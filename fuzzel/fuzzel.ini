[main]
font=JetBrainsMono Nerd Font:size=13
terminal=alacritty -e
launch-prefix=uwsm app --
prompt="Run > "
placeholder=Search applications
icon-theme=Papirus-Dark
icons-enabled=yes
lines=12
width=52
horizontal-pad=20
vertical-pad=14
inner-pad=8
line-height=24
letter-spacing=0
image-size-ratio=0.45
layer=overlay
exit-on-keyboard-focus-loss=yes

[border]
width=2
radius=10

[colors]
background=131210f2
text=bbb3a9ff
prompt=e17a3fff
placeholder=706a62ff
input=ddd5caff
match=d9a441ff
selection=23201cff
selection-text=ddd5caff
selection-match=e17a3fff
border=58534ccc
