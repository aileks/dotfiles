import = ["~/.config/alacritty/ashen.toml"]

[env]
SHLVL = "0"

[font]
size = 13.0

[font.normal]
family = "AdwaitaMono Nerd Font Mono"

[window]
opacity = 0.95

[window.padding]
x = 10
y = 10

[cursor.style]
shape = "Block"

[scrolling]
history = 10000

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
