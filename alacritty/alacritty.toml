[env]
SHLVL = "0"

[font]
size = 13.0
builtin_box_drawing = true

[font.normal]
family = "AdwaitaMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "AdwaitaMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "AdwaitaMono Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "AdwaitaMono Nerd Font Mono"
style = "Bold Italic"

[window]
opacity = 0.95
decorations = "None"

[window.padding]
x = 10
y = 10

[cursor.style]
shape = "Block"

[scrolling]
history = 10000

[general]
import = ["~/.config/alacritty/cinder-grove.toml"]
