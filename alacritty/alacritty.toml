[env]
SHLVL = "0"

[font]
size = 13
builtin_box_drawing = true
normal = { family = "AdwaitaMono Nerd Font Mono", style = "Regular" }
bold = { family = "AdwaitaMono Nerd Font Mono", style = "Bold" }
italic = { family = "AdwaitaMono Nerd Font Mono", style = "Italic" }
bold_italic = { family = "AdwaitaMono Nerd Font Mono", style = "Bold Italic" }

[window]
opacity = 0.95
decorations = "None"

[window.padding]
x = 10
y = 10

[cursor.style]
shape = "Block"

[scrolling]
history = 10000

[general]
import = ["~/.config/alacritty/cinder-grove.toml"]
