general.import = ["~/.config/omarchy/current/theme/alacritty.toml"]

[env]
TERM = "xterm-256color"

[font]
normal = { family = "AdwaitaMono Nerd Font Mono", style = "Regular" }
bold = { family = "AdwaitaMono Nerd Font Mono", style = "Bold" }
italic = { family = "AdwaitaMono Nerd Font Mono", style = "Italic" }
size = 16

[window]
padding.x = 14
padding.y = 14
decorations = "None"
opacity = 0.8

[keyboard]
bindings = [{ key = "F11", action = "ToggleFullscreen" }]
