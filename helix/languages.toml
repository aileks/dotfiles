# PHP
[[language]]
name = "php"
language-servers = [ "phpactor" ]
[language-server.phpactor]
command = "phpactor"
args = [ "language-server" ]

# Lua
[[language]]
name = "lua"
language-servers = [ "lua-ls" ]
[language-server.lua-ls]
command = "lua-language-server"

# Elixir
[[language]]
name = "elixir"
file-types = [ "ex", "exs" ]
roots = [ "mix.exs" ]
diagnostic-severity = "hint"
language-servers = [ "elixir-ls" ]
[language-server.elixir-ls]
command = "elixir-ls"

# Markdown
[[language]]
name = "markdown"
language-servers = [ "marksman" ]
[language-server.marksman]
command = "marksman"

# Python
[[language]]
name = "python"
language-servers = [ "pyright", "ruff" ]
[language-server.pyright.config.python.analysis]
typeCheckingMode = "basic"
[language-server.ruff]
command = "ruff-lsp"
[language-server.ruff.config.settings]
args = ["--ignore", "E501"]

# JS/TS
[[language]]
name = "javascript"
formatter = { command = 'prettierd', args = [".js"] }
auto-format = true
language-servers = [
  "typescript-language-server",
  "vscode-eslint-language-server",
]
[[language]]
name = "typescript"
formatter = { command = 'prettierd', args = [".ts"] }
auto-format = true
language-servers = [
  "typescript-language-server",
  "vscode-eslint-language-server",
]
[[language]]
name = "jsx"
formatter = { command = 'prettierd', args = [".jsx"] }
auto-format = true
language-servers = [
  "typescript-language-server",
  "vscode-eslint-language-server",
  "tailwindcss-ls"
]
[[language]]
name = "tsx"
formatter = { command = 'prettierd', args = [".tsx"] }
auto-format = true
language-servers = [
  "typescript-language-server",
  "vscode-eslint-language-server",
  "tailwindcss-ls"
]

# Web
[[language]]
name = "html"
formatter = { command = 'prettierd', args = [".html"] }
auto-format = true
language-servers = [ "vscode-html-language-server", "tailwindcss-ls" ]
[[language]]
name = "css"
formatter = { command = 'prettierd', args = [".css"] }
auto-format = true
language-servers = [ "vscode-css-language-server", "tailwindcss-ls" ]
[language-server.tailwindcss-ls]
command = "tailwindcss-language-server"
args = ["--stdio"]

# Astro
[[language]]
name = "astro"
formatter = { command = "prettier", args = ["--plugin", "prettier-plugin-astro", "--parser", "astro"] }
auto-format = true
language-servers = [ "astro-ls" ] 
[language-server.astro-ls]
command = "astro-ls"
args = ["--stdio"]
config = { typescript = { tsdk = "/home/aileks/.config/nvm/versions/node/v22.14.0/lib/node_modules/typescript/lib" }, environment = "node" }

# TOML
[[language]]
name = "toml"
formatter = { command = "taplo", args = ["fmt", "-"] }

# JSON
[[language]]
name = "json"
formatter = { command = 'prettierd', args = ["--parser", "json"] }
auto-format = true
[[language]]
name = "jsonc"
formatter = { command = 'prettierd', args = ["--parser", "jsonc"] }
auto-format = true
