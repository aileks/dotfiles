# Terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB:extkeys"
setw -g mode-keys vi
setw -g monitor-activity on
set -g extended-keys on

# Rebind leader key
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Keybinds
bind-key c new-window
bind -r n next-window
bind -r p previous-window
bind v copy-mode
bind t display-popup -h 99% -w 99%
bind o display-popup -E "tms"
bind s display-popup -E "tms switch"
bind w display-popup -E "tms windows"
bind Space last-window
bind ^ switch-client -l
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Config
set -g history-limit 10000
set -g renumber-windows on
set -g bell-action any
set -g set-titles on
set -g base-index 1
set -g detach-on-destroy off
set -g visual-bell off
set -g visual-activity off
set -g allow-rename off
set -g pane-base-index 1
set -g focus-events on
set -g mouse on
set -g escape-time 50
set -g set-clipboard on
set -g status-justify absolute-centre
set -g status-position top

# Theme
set -g status-style "fg=#BBB3A9,bg=#131210"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=#131210,bg=#E17A3F,bold"
set -g window-status-style "fg=#9A938A,bg=#1B1916"
set -g window-status-activity-style "fg=#879B5C,bg=#1B1916,bold"
set -g window-status-bell-style "fg=#DDD5CA,bg=#B34A45,bold"
set -g pane-border-style "fg=#58534C"
set -g pane-active-border-style "fg=#E17A3F"
set -g message-style "fg=#DDD5CA,bg=#23201C"
set -g message-command-style "fg=#9A938A,bg=#23201C"
set -g popup-style "fg=#BBB3A9,bg=#1B1916"
set -g popup-border-style "fg=#E17A3F"
set -g mode-style "fg=#131210,bg=#D9A441,bold"
set -g copy-mode-selection-style "fg=#131210,bg=#9A938A,bold"
set -g copy-mode-match-style "fg=#D9A441,bg=#23201C"
set -g copy-mode-current-match-style "fg=#131210,bg=#D9A441,bold"
set -g status-left "#[fg=#131210,bg=#E17A3F,bold] #S #[fg=#E17A3F,bg=#131210]"
set -g status-right "#[fg=#6785A1,bg=#131210,bold] #h #[fg=#9A938A,bg=#131210] #{pane_current_path} "
set -g status-left-length 50
set -g status-right-length 100
set -g status-interval 1
