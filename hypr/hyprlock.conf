general {
    grace = 1
}

animations {
    bezier = smooth, 0.5, 0, 0.5, 1
    animation = fade, 1, 1.8, smooth
}

background {
    path = /home/aileks/Pictures/wp.jpg
    blur_passes = 2
    blur_size = 7
    color = rgba(0,0,0,0.5)
}

input-field {
    size = 300, 60
    dots_size = 0.2
    outer_color = rgb(196, 167, 231)
    inner_color = rgb(38, 35, 58)
    font_color = rgb(224, 222, 244)
    fail_color = rgb(235, 111, 146)
    outline_thickness = 3
}

label {
    text = cmd[update:1000] echo "$USER<br/>$TIME"
    text_align = center
    font_size = 24
    font_family = "Rubik"
    position = 0, 80
}
