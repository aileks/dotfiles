# Set Environment
env = NVD_BACKEND,direct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = OZONE_PLATFORM,wayland
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32

ecosystem {
  no_update_news = true
}

# 4k Monitor Scaling
env = GDK_SCALE,1.75
monitor=,preferred,auto,1.666667

# Application Bindings
$terminal = uwsm app -- alacritty
$browser = uwsm app -- brave --new-window --ozone-platform=wayland
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

bind = SUPER, Q, killactive
bind = SUPER, W, exec, $browser
bind = SUPER, E, exec, uwsm app -- nautilus --new-window
bind = SUPER, M, exec, uwsm app -- deezer
bind = SUPER, D, exec, $terminal -e lazydocker
bind = SUPER, G, exec, uwsm app -- signal-desktop
bind = SUPER, return, exec, $terminal
bind = SUPER, ESCAPE, exec, ~/.local/bin/session
bind = SUPER, SPACE, exec, walker

bindel = ,XF86AudioRaiseVolume, exec, $osdclient --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, $osdclient --output-volume lower
bindel = ,XF86AudioMute, exec, $osdclient --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, $osdclient --input-volume mute-toggle
bindl = ,XF86AudioNext, exec, $osdclient --playerctl next
bindl = ,XF86AudioPause, exec, $osdclient --playerctl play-pause
bindl = ,XF86AudioPlay, exec, $osdclient --playerctl play-pause
bindl = ,XF86AudioPrev, exec, $osdclient --playerctl previous

bind = ,PRINT, exec, ~/.local/bin/screenshot
bind = SHIFT, PRINT, exec, ~/.local/bin/screenshot window
bind = CTRL, PRINT, exec, ~/.local/bin/screenshot output
bind = ALT, PRINT, exec, ~/.local/bin/screenrecord
bind = CTRL ALT, PRINT, exec, ~/.local/bin/screenrecord output
bind = SUPER, PRINT, exec, pkill hyprpicker || hyprpicker -a

bind = SUPER, COMMA, exec, makoctl dismiss
bind = SUPER SHIFT, COMMA, exec, makoctl dismiss --all
bind = SUPER CTRL, COMMA, exec, makoctl mode -t do-not-disturb && makoctl mode | grep -q 'do-not-disturb' && notify-send "Silenced notifications" || notify-send "Enabled notifications"

# Window Management
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

bind = SUPER SHIFT, H, swapwindow, l
bind = SUPER SHIFT, J, swapwindow, d
bind = SUPER SHIFT, K, swapwindow, u
bind = SUPER SHIFT, L, swapwindow, r

bind = SUPER SHIFT, space, togglefloating
bind = SHIFT, F11, fullscreen, 0
bind = SUPER, minus, resizeactive, -100 0
bind = SUPER, equal, resizeactive, 100 0
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Rules
windowrule = opacity 1 0.95, class:.*
windowrule = float, class:qalculate-gtk
windowrule = tag +pip, title:(Picture.{0,1}in.{0,1}[Pp]icture)
windowrule = float, tag:pip
windowrule = pin, tag:pip
windowrule = size 600 338, tag:pip
windowrule = keepaspectratio, tag:pip
windowrule = noborder, tag:pip
windowrule = opacity 1 1, tag:pip
windowrule = move 100%-w-40 4%, tag:pip
windowrule = float, class:xdg-desktop-portal-gtk, title:^(Open.*Files?|Save.*Files?|All Files|Save)
windowrule = center, class:xdg-desktop-portal-gtk, title:^(Open.*Files?|Save.*Files?|All Files|Save)
windowrule = size 800 600, class:^(blueman-manager|com.gabm.satty|nm-connection-editor)$
windowrule = float, class:^(blueman-manager|nm-connection-editor)$
layerrule = noanim, selection
layerrule = noanim, walker

# Look-n-Feel
general {
    gaps_in = 4
    gaps_out = 6
    col.active_border = 0xff8ec07c
}

decoration {
    rounding = 0

    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        noise = 0.02
        vibrancy = 0.1696
    }
}

animation {
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 0, ease
}

dwindle {
    preserve_split = true
    force_split = 2
}

input {
    kb_layout = us
    accel_profile=flat
    sensitivity=0.3
    repeat_rate = 50
    repeat_delay = 250
}

xwayland {
    force_zero_scaling = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering  = true
    focus_on_activate = true
}

# Autostart
exec-once = hyprctl setcursor "Posy Black Tiny" 32
exec-once = uwsm app -- nm-applet
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- mako -c ~/.config/mako/mako.ini
exec-once = uwsm app -- waybar
exec-once = uwsm app -- swaybg -i ~/.config/hypr/background.png -m fill
exec-once = uwsm app -- swayosd-server
exec-once = uwsm app -- walker --gapplication-service
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-clip-persist --clipboard regular --all-mime-type-regex '^(?!x-kde-passwordManagerHint).+'
