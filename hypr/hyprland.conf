# Set Environment
env = NVD_BACKEND,direct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# 4k Monitor Scaling
env = GDK_SCALE,1.75
monitor=,preferred,auto,1.666667

# Application bindings
$terminal = uwsm app -- alacritty
$browser = uwsm app -- brave --new-window --ozone-platform=wayland
$webapp = $browser --app

bind = SUPER, Q, killactive
bind = SUPER, return, Terminal, exec, $terminal
bind = SUPER, W, exec, $browser
bind = SUPER, E, exec, uwsm app -- nautilus --new-window
bind = SUPER, M, exec, uwsm app -- deezer
bind = SUPER, D, exec, $terminal -e lazydocker
bind = SUPER, G, exec, uwsm app -- signal-desktop

# Window Management
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

bind = SUPER SHIFT, H, swapwindow, l
bind = SUPER SHIFT, J, swapwindow, d
bind = SUPER SHIFT, K, swapwindow, u
bind = SUPER SHIFT, L, swapwindow, r

bind = SHIFT, F11, Force full screen, fullscreen, 0

# Look-n-Feel
windowrule = opacity 1 0.95, class:.*
windowrule = float, class:qalculate-gtk

general {
  gaps_in = 4
  gaps_out = 6
  col.active_border = 0xff8ec07c
}

decoration {
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
    }
}

input {
    kb_layout = us
    accel_profile=flat
    sensitivity=0.3
    repeat_rate = 50
    repeat_delay = 250
}

# Autostart
exec-once = hyprctl setcursor "Capitaine Cursors (Gruvbox)" 32
exec-once = uwsm app -- nm-applet
exec-once =
