# Font shit
font_family      FiraCode Nerd Font Mono
bold_font        FiraCode Nerd Font Mono Bold
italic_font      FiraCode Nerd Font Mono Italic
bold_italic_font FiraCode Nerd Font Mono Bold Italic
font_size 11.0

# Keep ligatures
disable_ligatures never

# Window padding
window_padding_width 3

# Tab settings
tab_bar_edge bottom
tab_bar_style fade
tab_bar_margin_width 0.1
tab_bar_margin_height 0.1 0.1

# No title bar
hide_window_decorations yes

# Fade text in inactive windows
inactive_text_alpha 0.8

# Disable annoying terminal bell
enable_audio_bell no

# Scroll more faster
wheel_scroll_min_lines 5 
wheel_scroll_multiplier 5.0

# Cursor uwu
cursor_shape beam
cursor #626880

# Theme
include current-theme.conf
