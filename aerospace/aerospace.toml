after-startup-command = []
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 6
inner.vertical = 6
outer.left = 6
outer.bottom = 6
outer.top = 6
outer.right = 6

[mode.main.binding]
cmd-alt-ctrl-r = 'reload-config'
cmd-alt-ctrl-slash = 'layout tiles horizontal vertical'

cmd-alt-ctrl-h = 'focus left'
cmd-alt-ctrl-j = 'focus down'
cmd-alt-ctrl-k = 'focus up'
cmd-alt-ctrl-l = 'focus right'

cmd-alt-ctrl-shift-h = 'move left'
cmd-alt-ctrl-shift-j = 'move down'
cmd-alt-ctrl-shift-k = 'move up'
cmd-alt-ctrl-shift-l = 'move right'

cmd-alt-ctrl-minus = 'resize smart -50'
cmd-alt-ctrl-equal = 'resize smart +50'

cmd-alt-ctrl-n = 'focus-monitor next'
cmd-alt-ctrl-p = 'focus-monitor prev'

cmd-alt-ctrl-shift-n = 'move-node-to-monitor next'
cmd-alt-ctrl-shift-p = 'move-node-to-monitor prev'

cmd-alt-ctrl-1 = 'workspace 1'
cmd-alt-ctrl-2 = 'workspace 2'
cmd-alt-ctrl-3 = 'workspace 3'
cmd-alt-ctrl-4 = 'workspace 4'
cmd-alt-ctrl-5 = 'workspace 5'
cmd-alt-ctrl-6 = 'workspace 6'
cmd-alt-ctrl-7 = 'workspace 7'
cmd-alt-ctrl-8 = 'workspace 8'
cmd-alt-ctrl-9 = 'workspace 9'
cmd-alt-ctrl-0 = 'workspace 10'

cmd-shift-alt-ctrl-1 = 'move-node-to-workspace 1'
cmd-shift-alt-ctrl-2 = 'move-node-to-workspace 2'
cmd-shift-alt-ctrl-3 = 'move-node-to-workspace 3'
cmd-shift-alt-ctrl-4 = 'move-node-to-workspace 4'
cmd-shift-alt-ctrl-5 = 'move-node-to-workspace 5'
cmd-shift-alt-ctrl-6 = 'move-node-to-workspace 6'
cmd-shift-alt-ctrl-7 = 'move-node-to-workspace 7'
cmd-shift-alt-ctrl-8 = 'move-node-to-workspace 8'
cmd-shift-alt-ctrl-9 = 'move-node-to-workspace 9'
cmd-shift-alt-ctrl-0 = 'move-node-to-workspace 10'

cmd-alt-ctrl-t = 'exec-and-forget open -a Ghostty'
cmd-alt-ctrl-f = 'exec-and-forget open -a Finder'
cmd-alt-ctrl-w = 'exec-and-forget open -a Helium'
cmd-alt-ctrl-s = 'exec-and-forget open -a Signal'
cmd-alt-ctrl-m = 'exec-and-forget open -a Cider'
cmd-alt-ctrl-d = 'exec-and-forget open -a Element'
cmd-alt-ctrl-o = 'exec-and-forget open -a Notesnook'
